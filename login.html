<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Places — Sign in</title>
  <link rel="icon" type="image/png" href="icon.png" sizes="any" />
  <link rel="icon" type="image/png" href="icon.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="icon.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0f12" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <img src="icon.png" alt="" class="login-icon" />
    <h1>Places</h1>
    <p class="muted">Sign in to your room.</p>
    <form id="login-form" class="login-form" novalidate>
      <label>
        Username
        <input name="username" autocomplete="username" autofocus required />
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <p id="login-error" class="error" hidden></p>
      <button type="submit">Sign in</button>
    </form>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
