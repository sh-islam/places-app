<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Places — Sign in</title>
  <link rel="icon" type="image/png" href="icon.png" sizes="any" />
  <link rel="icon" type="image/png" href="icon.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="icon.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0f12" />
  <!-- Pixel font for the login surface. Preconnect + display=swap so
       the first paint is usable even before the font arrives. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <!-- Splash played AFTER a successful sign-in, before we navigate
       into the app. Hidden by default so direct page loads just show
       the login card. Shown + animated by login.js on form success. -->
  <div id="splash-overlay" class="splash" hidden>
    <img src="icon.png" alt="" class="splash-icon" />
    <h1 class="splash-title">Places</h1>
    <p class="splash-slogan"><span id="splash-text"></span><span class="splash-caret">|</span></p>
  </div>
  <main class="login-card">
    <img src="icon.png" alt="" class="login-icon" />
    <h1>Places</h1>
    <p class="muted">Sign in to your room.</p>
    <form id="login-form" class="login-form" novalidate>
      <label>
        Username
        <input name="username" autocomplete="username" autofocus required />
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <p id="login-error" class="error" hidden></p>
      <button type="submit">Sign in</button>
    </form>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
